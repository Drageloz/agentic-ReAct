services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: react_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: react_db
      MYSQL_USER: reactuser
      MYSQL_PASSWORD: reactpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "reactuser", "--password=reactpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
    driver: local

