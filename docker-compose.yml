services:

  # ── SQL Server Database ─────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: react_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "React4as2#Strong!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "React4as2#Strong!",
             "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── DB Init (runs schema + seed once, then exits) ───────────────────────────
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: react_db_init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sql:/sql:ro
    command: >
      /bin/bash -c "
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'React4as2#Strong!' -i /sql/init.sql -C &&
        echo 'Schema initialised'
      "
    restart: "no"

  # ── FastAPI Application ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB settings to point at the compose service
      MSSQL_HOST: db
      MSSQL_PORT: 1433
      MSSQL_USER: sa
      MSSQL_PASSWORD: "React4as2#Strong!"
      MSSQL_DATABASE: react_db
      MSSQL_DRIVER: "ODBC Driver 18 for SQL Server"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mssql_data:
    driver: local
